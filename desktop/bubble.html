<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://*.ramppy.site http://localhost:*; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Nicole — Assistente Ramppy</title>
  <link rel="stylesheet" href="bubble.css">
</head>
<body>
  <!-- SVG gradient definitions (reusable) -->
  <svg style="position:absolute;width:0;height:0;" aria-hidden="true">
    <defs>
      <linearGradient id="aurora-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#34d399"/>
        <stop offset="33%" stop-color="#06b6d4"/>
        <stop offset="66%" stop-color="#10b981"/>
        <stop offset="100%" stop-color="#059669"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Collapsed: Orb made of colored blobs -->
  <div id="bubble" class="bubble" title="Nicole — Assistente Ramppy">
    <div class="siri-orb">
      <div class="siri-blob b1"></div>
      <div class="siri-blob b2"></div>
      <div class="siri-blob b3"></div>
      <div class="siri-blob b4"></div>
      <div class="siri-blob b5"></div>
      <div class="siri-glow"></div>
      <div class="siri-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.912 5.813a2 2 0 001.275 1.275L21 12l-5.813 1.912a2 2 0 00-1.275 1.275L12 21l-1.912-5.813a2 2 0 00-1.275-1.275L3 12l5.813-1.912a2 2 0 001.275-1.275L12 3z"/></svg>
      </div>
    </div>
  </div>

  <!-- Expanded: chat panel -->
  <div id="chat-panel" class="chat-panel" style="display:none;">
    <!-- Resize handles -->
    <div class="resize-handle resize-n" data-dir="n"></div>
    <div class="resize-handle resize-s" data-dir="s"></div>
    <div class="resize-handle resize-e" data-dir="e"></div>
    <div class="resize-handle resize-w" data-dir="w"></div>
    <div class="resize-handle resize-ne" data-dir="ne"></div>
    <div class="resize-handle resize-nw" data-dir="nw"></div>
    <div class="resize-handle resize-se" data-dir="se"></div>
    <div class="resize-handle resize-sw" data-dir="sw"></div>

    <!-- Aurora decorative line at top -->
    <div class="aurora-line"></div>

    <!-- Close button only -->
    <div class="chat-header">
      <button id="btn-close" class="btn-close" title="Fechar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Messages area -->
    <div id="chat-messages" class="chat-messages">
      <!-- Welcome state -->
      <div id="welcome-state" class="welcome-state">
        <div class="welcome-icon-wrap">
          <svg class="welcome-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#aurora-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.912 5.813a2 2 0 001.275 1.275L21 12l-5.813 1.912a2 2 0 00-1.275 1.275L12 21l-1.912-5.813a2 2 0 00-1.275-1.275L3 12l5.813-1.912a2 2 0 001.275-1.275L12 3z"/></svg>
        </div>
        <p class="welcome-title" id="welcome-title">Olá! Sou a Nicole</p>
        <p class="welcome-sub">Sua assistente pessoal de vendas da Ramppy</p>

        <!-- Input inline (welcome state) -->
        <div class="welcome-input-wrap">
          <input type="text" id="welcome-input" class="welcome-input" placeholder="Me pergunte qualquer coisa..." autocomplete="off">
          <button id="btn-send-welcome" class="btn-send-small" title="Enviar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>

        <!-- Suggestion cards (welcome state) — dynamically generated from screenshot -->
        <div id="welcome-suggestions" class="welcome-suggestions">
          <div class="suggestion-skeleton">
            <div class="skeleton-line"></div>
          </div>
          <div class="suggestion-skeleton">
            <div class="skeleton-line"></div>
          </div>
          <div class="suggestion-skeleton">
            <div class="skeleton-line"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Suggestion pills (during chat) -->
    <div id="chat-pills" class="chat-pills" style="display:none;">
      <button class="pill" data-msg="Como está minha performance?">Como está minha performance?</button>
      <button class="pill" data-msg="Quem precisa de atenção?">Quem precisa de atenção?</button>
      <button class="pill" data-msg="Compare os vendedores">Compare os vendedores</button>
    </div>

    <!-- Input bar (during chat) -->
    <div id="chat-input-bar" class="chat-input-bar" style="display:none;">
      <div class="input-wrap">
        <input type="text" id="chat-input" class="chat-input" placeholder="Fale com a Nicole..." autocomplete="off">
        <div class="input-actions">
          <button id="btn-send" class="btn-send-small" title="Enviar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="bubble.js"></script>
</body>
</html>
